<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Hommie Store</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f3f3f3;
}

header{
background:#111;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

header h2{
color:#ff9900;
}

.container{
width:90%;
max-width:900px;
margin:30px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:#ff9900;
border:none;
cursor:pointer;
}

button:hover{
background:#e68a00;
}

.product-list{
margin-top:20px;
}

.product{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #ddd;
}

.delete{
background:red;
color:white;
border:none;
padding:5px 10px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<h2>Admin Panel</h2>
<a href="index.html" style="color:white">Go to Store</a>
</header>

<div class="container">

<h3>Add Product</h3>

<input type="text" id="name" placeholder="Product Name">

<input type="number" id="price" placeholder="Product Price">

<button onclick="addProduct()">Add Product</button>

<div class="product-list" id="productList"></div>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

function addProduct(){

let name = document.getElementById("name").value;
let price = document.getElementById("price").value;

if(name=="" || price==""){

alert("Fill all fields");
return;

}

products.push({name,price});

localStorage.setItem("products",JSON.stringify(products));

displayProducts();

}

function displayProducts(){

let list = document.getElementById("productList");

list.innerHTML="";

products.forEach((p,index)=>{

list.innerHTML += `
<div class="product">
<span>${p.name} - ₹${p.price}</span>
<button class="delete" onclick="deleteProduct(${index})">Delete</button>
</div>
`;

});

}

function deleteProduct(index){

products.splice(index,1);

localStorage.setItem("products",JSON.stringify(products));

displayProducts();

}

displayProducts();

</script>

</body>
</html>
