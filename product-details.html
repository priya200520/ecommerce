<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products - Hommie Store</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f3f3f3;
}

/* HEADER */

header{
background:#111;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
}

header h2{
color:#ff9900;
}

nav a{
color:white;
margin-left:15px;
text-decoration:none;
}

/* PRODUCT GRID */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:40px;
}

.product{
background:white;
padding:15px;
text-align:center;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.product img{
width:100%;
height:200px;
object-fit:cover;
}

.price{
color:green;
font-size:18px;
margin:10px 0;
}

button{
background:#ff9900;
border:none;
padding:10px;
margin-top:5px;
cursor:pointer;
width:100%;
}

button:hover{
background:#e68a00;
}

/* MOBILE */

@media(max-width:600px){

header{
flex-direction:column;
gap:10px;
}

}

</style>
</head>

<body>

<header>

<h2>Hommie Store</h2>

<nav>
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="cart.html">Cart</a>
<a href="login.html">Login</a>
</nav>

</header>


<section class="products">

<div class="product">

<img src="https://via.placeholder.com/300">

<h3>T Shirt</h3>

<p class="price">₹499</p>

<button onclick="addCart('T Shirt',499)">Add To Cart</button>

<a href="product-details.html">
<button>View Details</button>
</a>

</div>


<div class="product">

<img src="https://via.placeholder.com/300">

<h3>Hoodie</h3>

<p class="price">₹999</p>

<button onclick="addCart('Hoodie',999)">Add To Cart</button>

<a href="product-details.html">
<button>View Details</button>
</a>

</div>


<div class="product">

<img src="https://via.placeholder.com/300">

<h3>Jeans</h3>

<p class="price">₹1299</p>

<button onclick="addCart('Jeans',1299)">Add To Cart</button>

<a href="product-details.html">
<button>View Details</button>
</a>

</div>

</section>


<script>

function addCart(name,price){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push({name:name,price:price});

localStorage.setItem("cart",JSON.stringify(cart));

alert("Product Added To Cart");

}

</script>

</body>
</html>
