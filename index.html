<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hommie Store</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f3f3f3;
}

/* HEADER */

header{
background:#111;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
}

header h2{
color:#ff9900;
}

nav a{
color:white;
margin-left:15px;
text-decoration:none;
font-size:16px;
}

nav a:hover{
color:#ff9900;
}

/* HERO */

.hero{
background:#222;
color:white;
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:40px;
margin-bottom:20px;
}

.hero button{
padding:12px 25px;
font-size:16px;
background:#ff9900;
border:none;
cursor:pointer;
}

.hero button:hover{
background:#e68a00;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:40px;
}

.product{
background:white;
padding:15px;
text-align:center;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.product img{
width:100%;
height:200px;
object-fit:cover;
}

.product h3{
margin:10px 0;
}

.price{
color:green;
font-size:18px;
}

.product button{
background:#ff9900;
border:none;
padding:10px;
width:100%;
cursor:pointer;
}

.product button:hover{
background:#e68a00;
}

/* FOOTER */

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:30px;
}

/* MOBILE */

@media(max-width:600px){

header{
flex-direction:column;
gap:10px;
}

}

</style>

</head>

<body>

<header>

<h2>Hommie Store</h2>

<nav>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="login.html">Login</a>
    <a href="register.html">Register</a>
    <a href="cart.html">Cart</a>
</nav>

</header>


<section class="hero">

<h1>Welcome to Hommie Store</h1>

<p>Best Clothing Collection</p>

<a href="products.html">
<button>Shop Now</button>
</a>

</section>


<section class="products">

<div class="product">

<img src="https://via.placeholder.com/300">

<h3>T Shirt</h3>

<p class="price">₹499</p>

<a href="products.html">
<button>View Product</button>
</a>

</div>


<div class="product">

<img src="https://via.placeholder.com/300">

<h3>Hoodie</h3>

<p class="price">₹999</p>

<a href="products.html">
<button>View Product</button>
</a>

</div>


<div class="product">

<img src="https://via.placeholder.com/300">

<h3>Jeans</h3>

<p class="price">₹1299</p>

<a href="products.html">
<button>View Product</button>
</a>

</div>


</section>


<footer>

<p>© 2026 Hommie Store | All Rights Reserved</p>

</footer>

</body>
</html>
