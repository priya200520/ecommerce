<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hommie Store</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
background:#131921;
padding:15px;
color:white;
}

.navbar h2{
font-size:24px;
}

.navbar input{
width:40%;
padding:8px;
border:none;
border-radius:4px;
}

.nav-links a{
color:white;
margin-left:15px;
text-decoration:none;
font-size:16px;
}

/* HERO SECTION */

.hero{
height:350px;
background:url("https://images.unsplash.com/photo-1523381210434-271e8be1f52b") center/cover;
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.hero h1{
font-size:40px;
background:rgba(0,0,0,0.5);
padding:15px;
}

/* PRODUCTS */

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:30px;
background:#f4f4f4;
}

.product{
background:white;
width:220px;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.product img{
width:100%;
border-radius:10px;
}

.product h3{
margin:10px 0;
}

.product p{
color:green;
font-weight:bold;
}

.product button{
margin-top:10px;
padding:10px;
background:black;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:#131921;
color:white;
}

/* RESPONSIVE */

@media(max-width:768px){

.navbar{
flex-direction:column;
gap:10px;
}

.navbar input{
width:90%;
}

.product{
width:45%;
}

}

@media(max-width:480px){

.product{
width:100%;
}

.hero h1{
font-size:28px;
}

}

</style>

</head>

<body>

<!-- NAVBAR -->

<header class="navbar">

<h2>Hommie</h2>

<input type="text" placeholder="Search products">

<div class="nav-links">

<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Cart</a>
<a href="#">Login</a>

</div>

</header>


<!-- HERO SECTION -->

<section class="hero">

<h1>Welcome to Hommie Store</h1>

</section>


<!-- PRODUCTS -->

<section class="products">

<div class="product">

<img src="https://via.placeholder.com/200">

<h3>Men Shirt</h3>

<p>₹499</p>

<button>Add To Cart</button>

</div>


<div class="product">

<img src="https://via.placeholder.com/200">

<h3>Hoodie</h3>

<p>₹999</p>

<button>Add To Cart</button>

</div>


<div class="product">

<img src="https://via.placeholder.com/200">

<h3>Jeans</h3>

<p>₹1299</p>

<button>Add To Cart</button>

</div>

</section>


<!-- FOOTER -->

<footer>

<p>© 2026 Hommie Store</p>

</footer>

</body>

</html>
