<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Success - Hommie Store</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f3f3f3;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.success-box{
background:white;
padding:40px;
text-align:center;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
width:350px;
}

.success-box h1{
color:green;
margin-bottom:20px;
}

.success-box p{
margin-bottom:20px;
}

.success-box button{
padding:10px 20px;
background:#ff9900;
border:none;
color:white;
font-size:16px;
cursor:pointer;
border-radius:5px;
}

.success-box button:hover{
background:#e68a00;
}

</style>
</head>

<body>

<div class="success-box">

<h1>🎉 Order Successful</h1>

<p>Your order has been placed successfully.</p>

<p>Thank you for shopping with Hommie Store.</p>

<a href="index.html">
<button>Continue Shopping</button>
</a>

</div>

</body>
</html>
