<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products - Hommie Store</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f3f3f3;
}

header{
background:#111;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h2{
color:#ff9900;
}

nav a{
color:white;
margin-left:15px;
text-decoration:none;
}

.search-box{
text-align:center;
margin:20px;
}

.search-box input{
padding:10px;
width:300px;
border:1px solid #ccc;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.product img{
width:100%;
height:220px;
object-fit:cover;
}

.product h3{
margin:10px 0;
}

.price{
color:green;
font-size:18px;
}

.rating{
color:gold;
}

button{
background:#ff9900;
border:none;
padding:10px;
width:100%;
margin-top:10px;
cursor:pointer;
}

button:hover{
background:#e68a00;
}

@media(max-width:600px){

header{
flex-direction:column;
}

.search-box input{
width:90%;
}

}

</style>

</head>

<body>

<header>
<h2>Hommie Store</h2>

<nav>
<a href="index.html">Home</a>
<a href="cart.html">Cart</a>
<a href="login.html">Login</a>
</nav>

</header>


<div class="search-box">
<input type="text" id="search" placeholder="Search products...">
</div>


<div class="products" id="productList">


<div class="product">
<img src="https://via.placeholder.com/300x220">
<h3>T Shirt</h3>
<p class="price">₹499</p>
<p class="rating">⭐⭐⭐⭐☆</p>
<button onclick="addCart('T Shirt',499)">Add to Cart</button>
</div>


<div class="product">
<img src="https://via.placeholder.com/300x220">
<h3>Hoodie</h3>
<p class="price">₹999</p>
<p class="rating">⭐⭐⭐⭐⭐</p>
<button onclick="addCart('Hoodie',999)">Add to Cart</button>
</div>


<div class="product">
<img src="https://via.placeholder.com/300x220">
<h3>Jeans</h3>
<p class="price">₹1299</p>
<p class="rating">⭐⭐⭐⭐☆</p>
<button onclick="addCart('Jeans',1299)">Add to Cart</button>
</div>


<div class="product">
<img src="https://via.placeholder.com/300x220">
<h3>Jacket</h3>
<p class="price">₹1999</p>
<p class="rating">⭐⭐⭐⭐⭐</p>
<button onclick="addCart('Jacket',1999)">Add to Cart</button>
</div>

</div>


<script>

function addCart(name,price){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push({name,price});

localStorage.setItem("cart",JSON.stringify(cart));

alert("Product Added to Cart");

}


document.getElementById("search").addEventListener("keyup",function(){

let filter = this.value.toLowerCase();

let products = document.querySelectorAll(".product");

products.forEach(function(product){

let text = product.innerText.toLowerCase();

product.style.display = text.includes(filter) ? "" : "none";

});

});

</script>

</body>
</html>
