<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Hommie Store</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f3f3f3;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:40px;
width:350px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.login-box h2{
text-align:center;
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

.login-box button{
width:100%;
padding:10px;
background:#ff6f00;
border:none;
color:white;
font-size:16px;
cursor:pointer;
border-radius:5px;
}

.login-box button:hover{
background:#e65c00;
}

.login-box p{
text-align:center;
margin-top:15px;
}

.login-box a{
color:#ff6f00;
text-decoration:none;
}

</style>
</head>

<body>

<div class="login-box">

<h2>User Login</h2>

<form id="loginForm">

<input type="email" placeholder="Enter Email" required>

<input type="password" placeholder="Enter Password" required>

<button type="submit">Login</button>

</form>

<p>Don't have account? <a href="register.html">Register</a></p>

</div>


<script>

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

alert("Login Successful!");

window.location.href="index.html";

});

</script>

</body>
</html>
