<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - Hommie Store</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f3f3f3;
}

header{
background:#111;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h2{
color:#ff9900;
}

nav a{
color:white;
margin-left:15px;
text-decoration:none;
}

.container{
width:90%;
max-width:900px;
margin:40px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-bottom:1px solid #ddd;
}

.cart-item button{
background:red;
color:white;
border:none;
padding:5px 10px;
cursor:pointer;
}

.total{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

.checkout{
margin-top:20px;
}

.checkout button{
background:#ff9900;
border:none;
padding:10px 20px;
cursor:pointer;
font-size:16px;
}

.checkout button:hover{
background:#e68a00;
}

@media(max-width:600px){

.cart-item{
flex-direction:column;
align-items:flex-start;
gap:10px;
}

}

</style>
</head>

<body>

<header>

<h2>Hommie Store</h2>

<nav>
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="cart.html">Cart</a>
</nav>

</header>


<div class="container">

<h2>Your Shopping Cart</h2>

<div id="cartItems"></div>

<div class="total" id="totalPrice"></div>

<div class="checkout">
<a href="checkout.html">
<button>Proceed to Checkout</button>
</a>
</div>

</div>


<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let cartItems = document.getElementById("cartItems");

let total = 0;

function displayCart(){

cartItems.innerHTML="";

total = 0;

cart.forEach((item,index)=>{

cartItems.innerHTML += `
<div class="cart-item">
<span>${item.name} - ₹${item.price}</span>
<button onclick="removeItem(${index})">Remove</button>
</div>
`;

total += item.price;

});

document.getElementById("totalPrice").innerText="Total: ₹"+total;

}

function removeItem(index){

cart.splice(index,1);

localStorage.setItem("cart",JSON.stringify(cart));

displayCart();

}

displayCart();

</script>

</body>
</html>
